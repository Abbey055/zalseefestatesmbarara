<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Zalsee Estates</title>
    <script>
      const path = location.pathname.replace('/zalseefestatesmbarara', '');
      if (path !== '/' && !path.includes('.')) {
        sessionStorage.setItem('redirect', path);
        location.replace('/zalseefestatesmbarara/');
      }
    </script>
  </head>
  <body>
    <script>
      const redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        window.history.replaceState(null, null, '/zalseefestatesmbarara' + redirect);
      }
    </script>
  </body>
</html>
